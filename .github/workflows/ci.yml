name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --quiet ruff mypy pytest pytest-mock pyspark IPython

      - name: Ruff check
        run: ruff check spark_query_analyzer/

      - name: Ruff format check
        run: ruff format --check spark_query_analyzer/

      - name: Type check
        run: mypy spark_query_analyzer/ --ignore-missing-imports

      - name: Run tests
        run: pytest tests/ -v
